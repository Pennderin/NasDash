<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; -webkit-tap-highlight-color: transparent !important; }
  *:focus, *:focus-visible, *:focus-within { outline: none !important; box-shadow: none !important; }
  ::selection { background: transparent; }
  ::-moz-focus-inner { border: 0; }
  div, span { -webkit-user-select: none; }

  :root {
    --bg: rgba(23, 26, 33, 0.92);
    --surface: rgba(27, 40, 56, 0.92);
    --surface2: rgba(42, 71, 94, 0.6);
    --border: rgba(255, 255, 255, 0.04);
    --border-glow: rgba(102, 192, 244, 0.2);
    --text: #c7d5e0;
    --text-dim: #8f98a0;
    --text-bright: #ffffff;
    --cyan: #66c0f4;
    --cyan-dim: rgba(102, 192, 244, 0.1);
    --cyan-glow: rgba(102, 192, 244, 0.2);
    --green: #a4d007;
    --green-dim: rgba(164, 208, 7, 0.1);
    --orange: #cf9e18;
    --orange-dim: rgba(207, 158, 24, 0.1);
    --red: #c33c54;
    --red-dim: rgba(195, 60, 84, 0.1);
    --blue: #1a9fff;
    --blue-dim: rgba(26, 159, 255, 0.1);
    --purple: #8b5cf6;
    --steam-bg: rgba(23, 26, 33, 0.95);
    --cr: 4px;
  }

  html, body { background: transparent !important; height: 100vh; overflow: hidden; }
  body {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text); user-select: none;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* Resize edges */
  .resize-edge { position: fixed; z-index: 999; }
  .resize-edge.top{top:0;left:6px;right:6px;height:6px;cursor:n-resize}
  .resize-edge.bottom{bottom:0;left:6px;right:6px;height:6px;cursor:s-resize}
  .resize-edge.left{top:6px;left:0;bottom:6px;width:6px;cursor:w-resize}
  .resize-edge.right{top:6px;right:0;bottom:6px;width:6px;cursor:e-resize}
  .resize-edge.top-left{top:0;left:0;width:10px;height:10px;cursor:nw-resize}
  .resize-edge.top-right{top:0;right:0;width:10px;height:10px;cursor:ne-resize}
  .resize-edge.bottom-left{bottom:0;left:0;width:10px;height:10px;cursor:sw-resize}
  .resize-edge.bottom-right{bottom:0;right:0;width:10px;height:10px;cursor:se-resize}
  body.locked .resize-edge{display:none}

  /* Cards */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--cr);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 0 8px rgba(0,0,0,0.2), inset 0 0 30px rgba(102,192,244,0.01);
  }
  .card::before {
    content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(102,192,244,0.12), transparent);
    pointer-events: none;
  }
  .card-inner { padding: 10px 12px; }
  .card.grow { flex: 1; min-height: 40px; display: flex; flex-direction: column; }
  .card.grow .card-inner { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .card.grow .card-content { flex: 1; min-height: 0; overflow-y: auto; outline: none !important; }
  .card.grow .card-content:focus, .card.grow .card-content:focus-visible { outline: none !important; }
  .card.grow .card-content::-webkit-scrollbar{width:2px}
  .card.grow .card-content::-webkit-scrollbar-track{background:transparent}
  .card.grow .card-content::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.15);border-radius:1px}

  /* Card handles */
  .card-handle{height:7px;cursor:row-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .card-handle-bar{width:24px;height:1px;background:rgba(0,200,255,0.08);transition:all .15s}
  .card-handle:hover .card-handle-bar{background:rgba(0,200,255,0.3);width:40px;box-shadow:0 0 6px rgba(0,200,255,0.2)}
  body.locked .card-handle{cursor:default;pointer-events:none}
  body.locked .card-handle-bar{display:none}

  /* Card reorder mode */
  body.reorder-mode .card[data-card-id] { cursor: grab; }
  body.reorder-mode .card[data-card-id]:active { cursor: grabbing; opacity: 0.6; }
  body.reorder-mode .card[data-card-id].drag-over { border-color: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }
  .card-drag-handle { display: none; position: absolute; left: 50%; top: 2px; transform: translateX(-50%); font-size: 8px; color: var(--text-dim); letter-spacing: 2px; opacity: 0.4; }
  body.reorder-mode .card-drag-handle { display: block; }

  /* Layout */
  .widget-wrap{display:flex;flex-direction:column;height:100vh;padding:6px;gap:0}
  body.collapsed .widget-wrap{height:auto}
  body.collapsed .scroll-area{display:none}
  .scroll-area{flex:1;min-height:0;display:flex;flex-direction:column;gap:0;overflow:hidden}

  /* Header */
  .header{padding:8px 12px 6px;display:flex;align-items:center;justify-content:space-between;-webkit-app-region:drag;cursor:grab}
  body.locked .header{-webkit-app-region:no-drag;cursor:default}
  .header-left{display:flex;align-items:center;gap:8px}
  .logo{
    width:22px;height:22px;border:1px solid var(--cyan);border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--cyan);
    box-shadow:0 0 8px rgba(102,192,244,0.15);
  }
  .header-title{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
  .header-right{display:flex;align-items:center;gap:5px;-webkit-app-region:no-drag}
  .header-time{font-size:9px;color:var(--text-dim)}
  .refresh-dot{width:4px;height:4px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s}
  .refresh-dot.active{opacity:1;box-shadow:0 0 6px var(--green)}
  .hdr-btn{cursor:pointer;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:10px;color:var(--text-dim);transition:all .15s;line-height:1;border:1px solid transparent}
  .hdr-btn:hover{border-color:var(--border-glow);color:var(--text);background:rgba(0,200,255,0.04)}
  .hdr-btn.close:hover{border-color:rgba(255,51,85,0.2);color:var(--red);background:var(--red-dim)}
  .hdr-btn.lock-active{color:var(--orange);border-color:rgba(255,136,0,0.2)}
  .hdr-btn.font-active{color:var(--cyan);border-color:rgba(0,200,255,0.2)}
  .hdr-btn.reorder-active{color:var(--green);border-color:rgba(0,255,136,0.2)}
  .hdr-btn.desktop-off{color:var(--cyan);border-color:rgba(0,200,255,0.2)}

  /* Caret dropdown */
  .caret-wrap{position:relative}
  .caret-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:rgba(27,40,56,0.98);border:1px solid var(--border-glow);border-radius:var(--cr);padding:4px;z-index:100;min-width:90px;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
  .caret-menu.open{display:block}
  .caret-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:2px;cursor:pointer;font-size:8px;color:var(--text-dim);transition:all .12s;white-space:nowrap}
  .caret-item:hover{background:rgba(0,200,255,0.04);color:var(--text)}
  .caret-item .ci-icon{width:14px;text-align:center;font-size:10px}
  .caret-item .ci-label{flex:1}
  .caret-item .ci-state{font-size:7px;opacity:.5}

  /* Section headers */
  .section-header{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-shrink:0}
  .section-icon{width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;border-radius:2px;border:1px solid}
  .section-label{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
  .section-count{font-size:8px;color:var(--text-dim);margin-left:auto;opacity:.7}
  .section-actions{margin-left:auto;display:flex;gap:3px;align-items:center}
  .section-btn{cursor:pointer;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:10px;font-weight:600;color:var(--text-dim);transition:all .15s;line-height:1;border:1px solid transparent}
  .section-btn:hover{border-color:var(--border-glow);color:var(--text);background:rgba(0,200,255,0.04)}
  .section-btn.active{border-color:rgba(255,51,85,0.2);color:var(--red);background:var(--red-dim)}
  .section-btn.active-accent{border-color:rgba(0,200,255,0.2);color:var(--cyan);background:var(--cyan-dim)}

  /* Speed */
  .speed-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
  .speed-stat{text-align:center;padding:7px 3px;background:var(--surface);border-radius:var(--cr);border:1px solid var(--border)}
  .speed-value{font-size:16px;font-weight:700;line-height:1.1}
  .speed-unit{font-size:7px;color:var(--text-dim);margin-top:1px}
  .speed-label{font-family:'Orbitron',sans-serif;font-size:6px;font-weight:500;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
  .speed-dl .speed-value{color:var(--green)} .speed-ul .speed-value{color:var(--cyan)} .speed-ping .speed-value{color:var(--orange)}
  .speed-meta{text-align:center;margin-top:4px;font-size:7px;color:var(--text-dim);opacity:.5}
  .speed-refresh{cursor:pointer;opacity:.4;transition:opacity .2s;font-size:11px} .speed-refresh:hover{opacity:1}
  @keyframes speedPulse{0%,100%{opacity:.3}50%{opacity:1}}
  .speed-running .speed-value{animation:speedPulse 1.2s ease infinite;color:var(--text-dim)!important}

  /* Steam */
  .section-label[onclick]{cursor:pointer;transition:color .15s}
  .section-label[onclick]:hover{color:var(--cyan)}
  .steam-game{display:flex;align-items:center;gap:7px;padding:4px 7px;background:transparent;border:1px solid transparent;border-radius:var(--cr);cursor:pointer;transition:background .15s,border-color .15s;margin-bottom:2px;outline:none !important;-webkit-tap-highlight-color:transparent !important}
  .steam-game:hover{border-color:var(--border-glow);background:var(--surface2)}
  .steam-game:active{opacity:.7}
  .steam-game:focus{outline:none !important}
  .steam-game-name{font-size:9px;font-weight:400;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .steam-game-time{font-size:7px;color:var(--text-dim);flex-shrink:0}
  .steam-game-dot{width:4px;height:4px;border-radius:50%;background:var(--cyan);flex-shrink:0;box-shadow:0 0 4px var(--cyan-glow)}
  .steam-drawer-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px;margin-top:3px;border-radius:var(--cr);cursor:pointer;font-size:8px;color:var(--text-dim);background:rgba(0,200,255,0.02);border:1px solid transparent;transition:all .15s;letter-spacing:.5px;flex-shrink:0;outline:none}
  .steam-drawer-btn:hover{border-color:var(--border-glow);color:var(--text)}
  .steam-drawer-btn:focus{outline:none}
  .steam-drawer-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:45;background:rgba(23,26,33,0.85);backdrop-filter:blur(4px);padding:6px;align-items:center;justify-content:center}
  .steam-drawer-overlay.open{display:flex}
  .steam-drawer-panel{background:var(--bg);border:1px solid var(--border-glow);border-radius:var(--cr);padding:8px;width:100%;max-height:calc(100% - 12px);display:flex;flex-direction:column;box-shadow:0 0 20px rgba(0,200,255,0.06),0 8px 30px rgba(0,0,0,0.6)}
  .steam-drawer-title{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:500;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  .steam-drawer-close{cursor:pointer;font-size:12px;color:var(--text-dim);transition:color .15s}
  .steam-drawer-close:hover{color:var(--red)}
  .steam-drawer-list{flex:1;overflow-y:auto;min-height:0}
  .steam-drawer-list::-webkit-scrollbar{width:2px} .steam-drawer-list::-webkit-scrollbar-track{background:transparent} .steam-drawer-list::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.15);border-radius:1px}
  .steam-drawer::-webkit-scrollbar{width:2px} .steam-drawer::-webkit-scrollbar-track{background:transparent} .steam-drawer::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.15);border-radius:1px}
  .steam-drawer-arrow{transition:transform .2s;display:inline-block;font-size:7px}.steam-drawer-arrow.open{transform:rotate(180deg)}

  /* Streams */
  .stream-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--cr);padding:7px 9px;margin-bottom:3px;position:relative;overflow:hidden}
  .stream-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--green);box-shadow:0 0 6px rgba(0,255,136,0.3)}
  .stream-title{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:6px;color:var(--text-bright)}
  .stream-meta{font-size:8px;color:var(--text-dim);margin-top:2px;display:flex;align-items:center;gap:6px;padding-left:6px}
  .stream-progress{height:1px;background:rgba(0,200,255,0.06);border-radius:0;margin-top:4px;margin-left:6px;overflow:hidden}
  .stream-progress-bar{height:100%;background:linear-gradient(90deg,#1a9fff,#66c0f4);transition:width 1s ease}

  /* Pipeline */
  .job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--cr);padding:7px 9px;margin-bottom:3px}
  .job-name{font-size:9px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .job-status{display:flex;align-items:center;gap:4px;margin-top:2px}
  .job-step{font-size:7px;padding:1px 5px;border-radius:2px;font-weight:500;letter-spacing:.5px}
  .step-transferring{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(51,136,255,0.15)}
  .step-renaming{background:rgba(170,85,255,0.1);color:var(--purple);border:1px solid rgba(170,85,255,0.15)}
  .step-queued{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,136,0,0.15)}
  .step-complete{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,255,136,0.15)}
  .step-failed{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,51,85,0.15)}
  .job-progress-text{font-size:8px;color:var(--text-dim)}

  /* Services */
  .services-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .service-pill{display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--cr);cursor:pointer;transition:all .15s}
  .service-pill:hover{border-color:var(--border-glow);background:var(--surface2);transform:translateY(-1px);box-shadow:0 0 6px rgba(0,200,255,0.04)}
  .service-pill:active{transform:scale(.97)}
  .service-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
  .dot-up{background:var(--green);box-shadow:0 0 4px rgba(0,255,136,0.4)} .dot-down{background:var(--red);box-shadow:0 0 4px rgba(255,51,85,0.4)}
  .service-name{font-size:8px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .service-open{font-size:7px;color:var(--text-dim);opacity:0;transition:opacity .15s} .service-pill:hover .service-open{opacity:.6}
  .service-pill.remove-mode{cursor:crosshair} .service-pill.remove-mode:hover{border-color:rgba(255,51,85,0.3);background:var(--red-dim)} .service-pill.remove-mode:hover .service-name{color:var(--red)}
  .service-pill.remove-mode .service-open{display:none}
  .service-pill.remove-mode::after{content:'\00d7';font-size:11px;color:var(--red);opacity:0;transition:opacity .15s} .service-pill.remove-mode:hover::after{opacity:1}
  .service-pill.reorder-mode{cursor:grab} .service-pill.reorder-mode:hover{border-color:var(--border-glow)}
  .service-pill.reorder-mode .service-open{display:none}
  .service-pill.reorder-mode .svc-grip{display:flex}
  .svc-grip{display:none;margin-left:auto;flex-shrink:0;color:var(--text-dim);font-size:9px;opacity:.3;pointer-events:none}
  .service-pill.reorder-mode:hover .svc-grip{opacity:.7}
  .service-pill.dragging{opacity:.3}
  .service-pill.drag-over-above{border-top:1px solid var(--cyan)} .service-pill.drag-over-below{border-bottom:1px solid var(--cyan)}

  /* Picker */
  .picker-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(23,26,33,0.9);backdrop-filter:blur(6px);z-index:50;padding:30px 14px;overflow-y:auto}
  .picker-overlay.visible{display:block}
  .picker-title{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:500;color:var(--cyan);margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
  .picker-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--cr);cursor:pointer;transition:all .15s}
  .picker-item:hover{border-color:var(--border-glow);background:var(--surface2);transform:translateX(3px)}
  .picker-item .pi-name{font-size:10px;flex:1} .picker-item .pi-port{font-size:8px;color:var(--text-dim)} .picker-item .pi-add{color:var(--green);font-size:12px;font-weight:700}
  .picker-close{text-align:center;padding:10px;font-size:9px;color:var(--text-dim);cursor:pointer;margin-top:8px;letter-spacing:1px;text-transform:uppercase} .picker-close:hover{color:var(--text)}

  /* Recent */
  .recent-item{display:flex;align-items:center;gap:7px;padding:3px 0}
  .recent-badge{font-size:6px;font-weight:600;padding:1px 4px;border-radius:2px;letter-spacing:.5px;flex-shrink:0;min-width:28px;text-align:center;border:1px solid}
  .badge-movie{background:var(--cyan-dim);color:var(--cyan);border-color:rgba(0,200,255,0.15)} .badge-show{background:rgba(170,85,255,0.08);color:var(--purple);border-color:rgba(170,85,255,0.15)} .badge-episode{background:var(--blue-dim);color:var(--blue);border-color:rgba(51,136,255,0.15)}
  .recent-title{font-size:9px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .recent-year{font-size:7px;color:var(--text-dim);flex-shrink:0}

  /* Library */
  .lib-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
  .lib-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--cr);padding:5px;text-align:center}
  .lib-count{font-size:14px;font-weight:700;color:var(--text-bright)}
  .lib-label{font-family:'Orbitron',sans-serif;font-size:6px;font-weight:500;color:var(--text-dim);margin-top:1px;letter-spacing:1px}
  .storage-bar-bg{height:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--cr);overflow:hidden;position:relative}
  .storage-bar-fill{height:100%;border-radius:calc(var(--cr) - 1px);background:linear-gradient(90deg,#1a9fff,#66c0f4);transition:width 1s ease}
  .storage-bar-fill.warn{background:linear-gradient(90deg,var(--orange),var(--red))}
  .storage-bar-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;font-weight:600;color:var(--text-bright);text-shadow:0 1px 4px rgba(0,0,0,.9)}
  .storage-details{display:flex;justify-content:space-between;margin-top:3px;font-size:7px;color:var(--text-dim)}
  .empty{text-align:center;padding:7px 0;font-size:9px;color:var(--text-dim);opacity:.4}

  /* Font controls - T (title) and B (body) */
  .font-controls{display:none;position:absolute;top:3px;right:5px;z-index:10;gap:3px;align-items:center}
  body.font-mode .font-controls{display:flex}
  .fc-group{display:flex;align-items:center;gap:1px;background:rgba(0,200,255,0.02);border:1px solid var(--border);border-radius:3px;padding:1px 2px}
  .fc-label{font-size:7px;font-weight:700;color:var(--text-dim);width:10px;text-align:center}
  .font-btn{cursor:pointer;width:12px;height:12px;display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:9px;font-weight:700;color:var(--text-dim);transition:all .15s}
  .font-btn:hover{color:var(--cyan)}
  .card.scalable{position:relative}
</style>
</head>
<body>

<div class="resize-edge top" data-edge="top"></div>
<div class="resize-edge bottom" data-edge="bottom"></div>
<div class="resize-edge left" data-edge="left"></div>
<div class="resize-edge right" data-edge="right"></div>
<div class="resize-edge top-left" data-edge="top-left"></div>
<div class="resize-edge top-right" data-edge="top-right"></div>
<div class="resize-edge bottom-left" data-edge="bottom-left"></div>
<div class="resize-edge bottom-right" data-edge="bottom-right"></div>

<div class="widget-wrap">

<script>
const http = require('http');
const { ipcRenderer } = require('electron');

// Kill all focus states globally after any click
document.addEventListener('mousedown', () => { if (document.activeElement) document.activeElement.blur(); });

const NAS_IP='192.168.0.190',PLEX_TOKEN='LAKWMV_Mz2oFF4w5yBWf',MM_PORT=9876,PLEX_PORT=32400,REFRESH_MS=30000;
const DEFAULT_CARD_ORDER = ['speed','steam','playing','pipeline','services','recent','library'];
let cardOrder = [...DEFAULT_CARD_ORDER];

const ALL_SERVICES=[
  {name:'Plex',port:32400,url:'http://192.168.0.190:32400/web'},{name:'Media Manager',port:9876,url:'http://192.168.0.190:9876'},
  {name:'Media Companion',port:3001,url:'http://192.168.0.190:3001'},{name:'Hunterr',port:9878,url:'http://192.168.0.190:9878'},
  {name:'Audiobookshelf',port:13378,url:'http://192.168.0.190:13378'},{name:'Home Assistant',port:8123,url:'http://192.168.0.190:8123'},
  {name:'Homebridge',port:8581,url:'http://192.168.0.190:8581'},{name:'FlareSolverr 1',port:8191,url:'http://192.168.0.190:8191'},
  {name:'FlareSolverr 2',port:8192,url:'http://192.168.0.190:8192'},{name:'Claude Door',port:2280,url:'http://192.168.0.190:2280'},
  {name:'Loot Tracker',port:3100,url:'http://192.168.0.190:3100'},{name:'RustDesk',port:21117,url:''},
  {name:'Unraid WebUI',port:80,url:'http://192.168.0.190'},
];
const DEFAULT_SVC=['Plex','Media Manager','Media Companion','Hunterr','Audiobookshelf','Home Assistant','FlareSolverr 1','Claude Door'];
let activeSvc=[...DEFAULT_SVC],removeMode=false,reorderSvcMode=false,collapsed=false,isLocked=false;

// ─── Helpers ───
function httpGet(h,p,path,t=5000){return new Promise((ok,no)=>{const r=http.get({hostname:h,port:p,path,timeout:t},res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>ok(d));});r.on('error',no);r.on('timeout',()=>{r.destroy();no(new Error('t'));});})}
function xAttr(xml,tag){const r=[],re=new RegExp(`<${tag}\\s([^>]+?)\\s*/?>`, 'g');let m;while((m=re.exec(xml))!==null){const a={};let am;const ar=/(\w+)="([^"]*)"/g;while((am=ar.exec(m[1]))!==null)a[am[1]]=am[2].replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');r.push(a);}return r;}
function openService(u){if(u)ipcRenderer.send('open-url',u);}

// ─── Build cards from templates in order ───
function buildCards() {
  const area = document.getElementById('scrollArea');
  area.innerHTML = '';

  let prevGrowVal = null;
  cardOrder.forEach((id) => {
    const tpl = document.getElementById('tpl-' + id);
    if (!tpl) return;
    const node = tpl.content.cloneNode(true);
    const card = node.querySelector('.card');
    const growVal = card ? card.getAttribute('data-grow') : null;

    // Add handle between consecutive grow cards
    if (growVal !== null && prevGrowVal !== null) {
      const handle = document.createElement('div');
      handle.className = 'card-handle';
      handle.dataset.above = prevGrowVal;
      handle.dataset.below = growVal;
      handle.innerHTML = '<div class="card-handle-bar"></div>';
      area.appendChild(handle);
    }

    area.appendChild(node);
    prevGrowVal = growVal !== null ? growVal : null;
  });
  setupCardHandleListeners();
}

// ─── Window resize ───
let wr=false,we='',wlx=0,wly=0;
document.querySelectorAll('.resize-edge').forEach(el=>{el.addEventListener('mousedown',e=>{if(isLocked)return;wr=true;we=el.dataset.edge;wlx=e.screenX;wly=e.screenY;e.preventDefault();});});
document.addEventListener('mousemove',e=>{if(wr){ipcRenderer.send('resize',we,e.screenX-wlx,e.screenY-wly);wlx=e.screenX;wly=e.screenY;}if(cardDrag.active)doCardDrag(e);});
document.addEventListener('mouseup',()=>{if(wr){wr=false;ipcRenderer.send('resize-done');}if(cardDrag.active)endCardDrag();});

// ─── Card flex resize ───
const defaultRatios={0:1,1:1,2:1,3:2,4:1};
let ratios={...defaultRatios};
function applyRatios(){document.querySelectorAll('.card[data-grow]').forEach(c=>{c.style.flex=ratios[c.dataset.grow]||1;});}
const cardDrag={active:false,aboveIdx:null,belowIdx:null,startY:0,startAbove:0,startBelow:0};

function setupCardHandleListeners() {
  document.querySelectorAll('.card-handle').forEach(h=>{
    h.addEventListener('mousedown',e=>{
      if(isLocked)return;
      const ai=h.dataset.above,bi=h.dataset.below;
      cardDrag.active=true;cardDrag.aboveIdx=ai;cardDrag.belowIdx=bi;
      cardDrag.startY=e.screenY;cardDrag.startAbove=ratios[ai]||1;cardDrag.startBelow=ratios[bi]||1;
      e.preventDefault();
    });
  });
}

function doCardDrag(e){
  const dy=e.screenY-cardDrag.startY;const total=cardDrag.startAbove+cardDrag.startBelow;
  const delta=dy/100;let na=Math.max(.3,cardDrag.startAbove+delta);let nb=Math.max(.3,cardDrag.startBelow-delta);
  const s=total/(na+nb);na*=s;nb*=s;ratios[cardDrag.aboveIdx]=Math.round(na*100)/100;ratios[cardDrag.belowIdx]=Math.round(nb*100)/100;applyRatios();
}
function endCardDrag(){cardDrag.active=false;ipcRenderer.send('save-ratios',ratios);}

// ─── Card reorder (drag cards) ───
let cardReorderMode = false;
function toggleCardReorder() {
  cardReorderMode = !cardReorderMode;
  document.body.classList.toggle('reorder-mode', cardReorderMode);
  const st=document.getElementById('reorderState');if(st)st.textContent=cardReorderMode?'on':'off';
}

let dragCardId = null;
document.getElementById('scrollArea').addEventListener('dragstart', e => {
  if (!cardReorderMode) return;
  const card = e.target.closest('.card[data-card-id]');
  if (!card) return;
  dragCardId = card.dataset.cardId;
  card.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragCardId);
});
document.getElementById('scrollArea').addEventListener('dragend', e => {
  const card = e.target.closest('.card[data-card-id]');
  if (card) card.style.opacity = '';
  document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
  dragCardId = null;
});
document.getElementById('scrollArea').addEventListener('dragover', e => {
  if (!cardReorderMode || !dragCardId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
  const card = e.target.closest('.card[data-card-id]');
  if (card && card.dataset.cardId !== dragCardId) card.classList.add('drag-over');
});
document.getElementById('scrollArea').addEventListener('drop', e => {
  e.preventDefault();
  const targetCard = e.target.closest('.card[data-card-id]');
  if (!targetCard || !dragCardId) return;
  const fromId = dragCardId;
  const toId = targetCard.dataset.cardId;
  if (fromId === toId) return;
  const fromIdx = cardOrder.indexOf(fromId);
  const toIdx = cardOrder.indexOf(toId);
  cardOrder.splice(fromIdx, 1);
  cardOrder.splice(toIdx, 0, fromId);
  ipcRenderer.send('save-order', cardOrder);
  buildCards();
  applyRatios();
  applyAllScales();
  // Make cards draggable again
  document.querySelectorAll('.card[data-card-id]').forEach(c => c.draggable = cardReorderMode);
  refreshAll();
  loadSteamGames();
});

// Enable/disable draggable on cards when reorder mode toggles
const origToggle = toggleCardReorder;
// Observe body class changes to set draggable
new MutationObserver(() => {
  document.querySelectorAll('.card[data-card-id]').forEach(c => c.draggable = cardReorderMode);
}).observe(document.body, { attributes: true, attributeFilter: ['class'] });

// ─── Caret settings menu ───
function toggleCaretMenu() {
  document.getElementById('caretMenu').classList.toggle('open');
}
// Close on click outside
document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.caret-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('caretMenu').classList.remove('open');
});

// ─── Lock ───
function toggleLock(){ipcRenderer.send('toggle-lock');}
ipcRenderer.on('lock-state',(ev,l)=>{
  isLocked=l;document.body.classList.toggle('locked',l);
  const ic=document.getElementById('lockIcon');if(ic)ic.innerHTML=l?'&#x1F512;':'&#x1F513;';
  const st=document.getElementById('lockState');if(st)st.textContent=l?'on':'off';
});
ipcRenderer.invoke('get-lock-state').then(l=>{
  isLocked=l;document.body.classList.toggle('locked',l);
  const ic=document.getElementById('lockIcon');if(ic)ic.innerHTML=l?'&#x1F512;':'&#x1F513;';
  const st=document.getElementById('lockState');if(st)st.textContent=l?'on':'off';
});

// ─── Collapse ───
function toggleCollapse(){collapsed=!collapsed;document.body.classList.toggle('collapsed',collapsed);document.getElementById('collapseBtn').innerHTML=collapsed?'&#x25A1;':'&#x2014;';ipcRenderer.send(collapsed?'collapse-widget':'expand-widget');}

// ─── Clock ───
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}
setInterval(updateClock,1000);updateClock();
function flashRefresh(){const d=document.getElementById('refreshDot');d.classList.add('active');setTimeout(()=>d.classList.remove('active'),1000);}

// ─── Speed ───
function requestSpeedTest(){ipcRenderer.send('run-speedtest');}
function showSpeed(d){document.getElementById('speedDl').textContent=d.download;document.getElementById('speedUl').textContent=d.upload;document.getElementById('speedPing').textContent=d.ping;const ts=new Date(d.timestamp);document.getElementById('speedMeta').innerHTML=`${d.server||''} &middot; ${ts.toLocaleDateString('en-US',{month:'short',day:'numeric'})} ${ts.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}`;}
ipcRenderer.on('speedtest-results',(ev,d)=>{const g=document.getElementById('speedGrid'),m=document.getElementById('speedMeta');if(d.running){g.classList.add('speed-running');m.textContent='Running...';return;}g.classList.remove('speed-running');if(d.error){m.textContent='Failed';return;}showSpeed(d);});
ipcRenderer.invoke('get-cached-speed').then(d=>{if(d?.download)showSpeed(d);});

// ─── Steam ───
const steamFs=require('fs'),steamPath=require('path');
const STEAM_LIBS=['C:\\Program Files (x86)\\Steam\\steamapps','D:\\SteamLibrary\\steamapps'];
function parseACF(t){const g=k=>{const m=t.match(new RegExp('"'+k+'"\\s+"([^"]+)"'));return m?m[1]:'';};return{appid:g('appid'),name:g('name'),lastPlayed:parseInt(g('LastPlayed'))||0,size:parseInt(g('SizeOnDisk'))||0};}
function scanSteamGames(){const games=[],skip=['Steamworks Common Redistributables','DisplayFusion'];for(const lib of STEAM_LIBS){try{steamFs.readdirSync(lib).filter(f=>f.startsWith('appmanifest_')&&f.endsWith('.acf')).forEach(f=>{try{const d=parseACF(steamFs.readFileSync(steamPath.join(lib,f),'utf8'));if(d.name&&d.appid&&!skip.includes(d.name)&&!d.name.includes('Soundtrack'))games.push(d);}catch(e){}});}catch(e){}}return games.sort((a,b)=>b.lastPlayed-a.lastPlayed);}
function timeAgo(ts){if(!ts)return'';const d=Math.floor(Date.now()/1000-ts);if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';if(d<2592000)return Math.floor(d/86400)+'d';return Math.floor(d/2592000)+'mo';}
function formatSize(b){return b>1e9?(b/1e9).toFixed(1)+' GB':(b/1e6).toFixed(0)+' MB';}
function launchSteam(u){ipcRenderer.send('open-url',u);}
function launchSteamBig(){
  // Exit small mode and open main window, then navigate to games
  launchSteam('steam://open/main');
  setTimeout(()=>launchSteam('steam://open/games'), 500);
}
let steamDrawerOpen=false,allSteamGames=[];
function toggleSteamDrawer(){
  steamDrawerOpen=!steamDrawerOpen;
  document.getElementById('steamDrawerOverlay').classList.toggle('open',steamDrawerOpen);
  document.getElementById('steamArrow')?.classList.toggle('open',steamDrawerOpen);
}
function loadSteamGames(){
  allSteamGames=scanSteamGames();
  const el=document.getElementById('steamRecent'),dr=document.getElementById('steamDrawer'),lb=document.getElementById('steamDrawerLabel'),title=document.getElementById('steamDrawerTitle');
  if(!el)return;
  const recent=allSteamGames.filter(g=>g.lastPlayed>0).slice(0,4);
  el.innerHTML=recent.length?recent.map(g=>`<div class="steam-game" tabindex="-1" onmousedown="this.blur()" onclick="launchSteam('steam://rungameid/${g.appid}');this.blur()"><div class="steam-game-dot"></div><span class="steam-game-name">${g.name}</span><span class="steam-game-time">${timeAgo(g.lastPlayed)}</span></div>`).join(''):'<div class="empty">No recent games</div>';
  const sorted=[...allSteamGames].sort((a,b)=>a.name.localeCompare(b.name));
  if(lb)lb.textContent=`All Games (${sorted.length})`;
  if(title)title.textContent=`All Games (${sorted.length})`;
  if(dr)dr.innerHTML=sorted.map(g=>`<div class="steam-game" tabindex="-1" onmousedown="this.blur()" onclick="launchSteam('steam://rungameid/${g.appid}');this.blur()" title="${formatSize(g.size)}"><div class="steam-game-dot"></div><span class="steam-game-name">${g.name}</span><span class="steam-game-time">${formatSize(g.size)}</span></div>`).join('');
}

// ─── Services ───
function getActive(){return activeSvc.map(n=>ALL_SERVICES.find(s=>s.name===n)).filter(Boolean);}
function saveSvc(){ipcRenderer.send('save-services',activeSvc);}
let lastSvc=null;
function toggleRemoveMode(){if(reorderSvcMode)toggleReorderMode();removeMode=!removeMode;document.getElementById('svcRemoveBtn')?.classList.toggle('active',removeMode);renderSvc(lastSvc||getActive().map(s=>({...s,up:true})));}
function toggleReorderMode(){if(removeMode)toggleRemoveMode();reorderSvcMode=!reorderSvcMode;document.getElementById('svcReorderBtn')?.classList.toggle('active-accent',reorderSvcMode);renderSvc(lastSvc||getActive().map(s=>({...s,up:true})));}
function removeService(n){activeSvc=activeSvc.filter(x=>x!==n);saveSvc();fetchServices();}
function addService(n){if(!activeSvc.includes(n)){activeSvc.push(n);saveSvc();}closeServicePicker();fetchServices();}
function openServicePicker(){const a=ALL_SERVICES.filter(s=>!activeSvc.includes(s.name));document.getElementById('pickerList').innerHTML=a.length===0?'<div class="empty" style="padding:20px 0;">All added</div>':a.map(s=>`<div class="picker-item" onclick="addService('${s.name}')"><span class="pi-add">+</span><span class="pi-name">${s.name}</span><span class="pi-port">:${s.port}</span></div>`).join('');document.getElementById('pickerOverlay').classList.add('visible');}
function closeServicePicker(){document.getElementById('pickerOverlay').classList.remove('visible');}
function renderSvc(results){
  lastSvc=results;const el=document.getElementById('services');if(!el)return;
  el.innerHTML=results.map((s,i)=>{
    const rm=removeMode?' remove-mode':reorderSvcMode?' reorder-mode':'';
    const oc=removeMode?`removeService('${s.name}')`:reorderSvcMode?'':`openService('${s.url}')`;
    const drag=reorderSvcMode?`draggable="true" data-idx="${i}"`:'';
    return `<div class="service-pill${rm}" onclick="${oc}" ${drag} title="${removeMode?'Remove':reorderSvcMode?'Drag to reorder':'Open '+s.name}"><div class="service-dot ${s.up?'dot-up':'dot-down'}"></div><span class="service-name">${s.name}</span><span class="svc-grip">&#x2261;</span><span class="service-open">&#x2197;</span></div>`;
  }).join('');
  if(reorderSvcMode)setupSvcDrag();
}
let svcDragIdx=null;
function setupSvcDrag(){const pills=document.querySelectorAll('.service-pill.reorder-mode');pills.forEach(p=>{p.addEventListener('dragstart',e=>{svcDragIdx=parseInt(p.dataset.idx);p.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',svcDragIdx);});p.addEventListener('dragend',()=>{p.classList.remove('dragging');pills.forEach(x=>x.classList.remove('drag-over-above','drag-over-below'));});p.addEventListener('dragover',e=>{e.preventDefault();pills.forEach(x=>x.classList.remove('drag-over-above','drag-over-below'));const ti=parseInt(p.dataset.idx);if(ti===svcDragIdx)return;const r=p.getBoundingClientRect();e.clientY<r.top+r.height/2?p.classList.add('drag-over-above'):p.classList.add('drag-over-below');});p.addEventListener('dragleave',()=>p.classList.remove('drag-over-above','drag-over-below'));p.addEventListener('drop',e=>{e.preventDefault();const fi=parseInt(e.dataTransfer.getData('text/plain')),ti=parseInt(p.dataset.idx);if(fi===ti)return;const r=p.getBoundingClientRect(),after=e.clientY>=r.top+r.height/2;const mv=activeSvc[fi];activeSvc.splice(fi,1);let ni=ti>fi?ti-1:ti;if(after)ni++;activeSvc.splice(ni,0,mv);saveSvc();if(lastSvc){const mr=lastSvc[fi];lastSvc.splice(fi,1);let ni2=ti>fi?ti-1:ti;if(after)ni2++;lastSvc.splice(ni2,0,mr);}renderSvc(lastSvc||getActive().map(s=>({...s,up:true})));});});}
async function fetchServices(){const svcs=getActive();const r=await Promise.all(svcs.map(async s=>{try{await httpGet(NAS_IP,s.port,'/',3000);return{...s,up:true};}catch{return{...s,up:false};}}));renderSvc(r);}

// ─── Data fetchers ───
async function fetchStreams(){try{const xml=await httpGet(NAS_IP,PLEX_PORT,`/status/sessions?X-Plex-Token=${PLEX_TOKEN}`);const v=xAttr(xml,'Video');const el=document.getElementById('streams'),cnt=document.getElementById('streamCount');if(!el)return;if(!v.length){el.innerHTML='<div class="empty">Nothing playing</div>';if(cnt)cnt.textContent='';return;}if(cnt)cnt.textContent=`${v.length} stream${v.length>1?'s':''}`;el.innerHTML=v.map(v=>{const p=v.viewOffset&&v.duration?Math.round(parseInt(v.viewOffset)/parseInt(v.duration)*100):0;const d=v.duration?Math.round(parseInt(v.duration)/60000):0;const o=v.viewOffset?Math.round(parseInt(v.viewOffset)/60000):0;const t=v.grandparentTitle?`${v.grandparentTitle} - ${v.title}`:v.title||'?';const r=v.videoResolution||'';return `<div class="stream-card"><div class="stream-title">${t}</div><div class="stream-meta"><span>${v.year||''}</span>${r?`<span>${r}p</span>`:''}<span>${o}m / ${d}m</span></div><div class="stream-progress"><div class="stream-progress-bar" style="width:${p}%"></div></div></div>`;}).join('');}catch{const el=document.getElementById('streams');if(el)el.innerHTML='<div class="empty">Plex unreachable</div>';}}
async function fetchPipeline(){try{const d=JSON.parse(await httpGet(NAS_IP,MM_PORT,'/status'));const j=d.jobs||[];const el=document.getElementById('pipeline'),cnt=document.getElementById('jobCount');if(!el)return;if(!j.length){el.innerHTML='<div class="empty">No active jobs</div>';if(cnt)cnt.textContent='';return;}if(cnt)cnt.textContent=`${j.filter(x=>x.status!=='complete'&&x.status!=='cancelled').length} active`;el.innerHTML=j.slice(0,5).map(j=>{const sc=j.step==='transferring'?'step-transferring':j.step==='renaming'?'step-renaming':j.status==='complete'?'step-complete':j.status==='failed'?'step-failed':'step-queued';let n=(j.name||'?').replace(/\.(mkv|mp4|avi|mov)$/i,'').replace(/\./g,' ').trim();if(n.length>40)n=n.substring(0,37)+'...';return `<div class="job-card"><div class="job-name">${n}</div><div class="job-status"><span class="job-step ${sc}">${j.step||j.status||'?'}</span><span class="job-progress-text">${j.progress||''}</span></div></div>`;}).join('');}catch{const el=document.getElementById('pipeline');if(el)el.innerHTML='<div class="empty">Media Manager unreachable</div>';}}
async function fetchRecent(){try{const xml=await httpGet(NAS_IP,PLEX_PORT,`/library/recentlyAdded?X-Plex-Token=${PLEX_TOKEN}&X-Plex-Container-Size=8`);const it=[...xAttr(xml,'Video'),...xAttr(xml,'Directory')].slice(0,7);const el=document.getElementById('recent');if(!el)return;if(!it.length){el.innerHTML='<div class="empty">No recent</div>';return;}el.innerHTML=it.map(i=>{const tp=i.type||'movie';const bc=tp==='movie'?'badge-movie':tp==='show'?'badge-show':'badge-episode';const bl=tp==='movie'?'FILM':tp==='show'?'SHOW':tp==='season'?'SSN':'EP';const t=i.grandparentTitle?`${i.grandparentTitle} - ${i.title}`:i.parentTitle&&i.title?`${i.parentTitle} - ${i.title}`:i.title||'?';return `<div class="recent-item"><span class="recent-badge ${bc}">${bl}</span><span class="recent-title">${t}</span><span class="recent-year">${i.year||''}</span></div>`;}).join('');}catch{const el=document.getElementById('recent');if(el)el.innerHTML='<div class="empty">Could not fetch</div>';}}
async function fetchLib(){try{const xml=await httpGet(NAS_IP,PLEX_PORT,`/library/sections?X-Plex-Token=${PLEX_TOKEN}`);const secs=xAttr(xml,'Directory');const stats=await Promise.all(secs.filter(s=>s.key).map(async s=>{try{const x2=await httpGet(NAS_IP,PLEX_PORT,`/library/sections/${s.key}/all?X-Plex-Token=${PLEX_TOKEN}&X-Plex-Container-Start=0&X-Plex-Container-Size=0`);const m=x2.match(/totalSize="(\d+)"/);return{count:m?parseInt(m[1]):0,type:s.type};}catch{return{count:0,type:s.type};}}));const mov=stats.filter(s=>s.type==='movie').reduce((a,s)=>a+s.count,0);const shw=stats.filter(s=>s.type==='show').reduce((a,s)=>a+s.count,0);const el=document.getElementById('libStats');if(el)el.innerHTML=`<div class="lib-stat"><div class="lib-count">${mov.toLocaleString()}</div><div class="lib-label">Movies</div></div><div class="lib-stat"><div class="lib-count">${shw.toLocaleString()}</div><div class="lib-label">Shows</div></div><div class="lib-stat"><div class="lib-count">${(mov+shw).toLocaleString()}</div><div class="lib-label">Total</div></div>`;}catch{}}
async function refreshAll(){flashRefresh();await Promise.allSettled([fetchStreams(),fetchPipeline(),fetchServices(),fetchRecent(),fetchLib()]);}

// ─── Desktop icons toggle ───
let desktopIconsOn = true;
function toggleDesktopIcons() {
  desktopIconsOn = !desktopIconsOn;
  ipcRenderer.send('toggle-desktop-icons');
  const btn = document.getElementById('desktopBtn');
  btn.classList.toggle('desktop-off', !desktopIconsOn);
}

// ─── Font scaling ───
let fontMode=false;
let fontScales={speed:{t:100,b:100},steam:{t:100,b:100},playing:{t:100,b:100},pipeline:{t:100,b:100},services:{t:100,b:100},recent:{t:100,b:100},library:{t:100,b:100}};
function toggleFontMode(){
  fontMode=!fontMode;
  document.body.classList.toggle('font-mode',fontMode);
  const st=document.getElementById('fontState');if(st)st.textContent=fontMode?'on':'off';
}
function scaleCard(id,which,dir){
  if(!fontScales[id])fontScales[id]={t:100,b:100};
  fontScales[id][which]=Math.max(50,Math.min(200,fontScales[id][which]+dir*5));
  applyScale(id);
  ipcRenderer.send('save-scales',fontScales);
}
function applyScale(id){
  const c=document.querySelector(`.card[data-scale-id="${id}"]`);
  if(!c)return;
  const s=fontScales[id]||{t:100,b:100};
  const header=c.querySelector('.section-header');
  if(header)header.style.zoom=(s.t/100).toString();
  // Body = everything after the header
  const inner=c.querySelector('.card-inner');
  if(inner){
    Array.from(inner.children).forEach(el=>{
      if(!el.classList.contains('section-header')&&!el.classList.contains('font-controls')){
        el.style.zoom=(s.b/100).toString();
      }
    });
  }
}
function applyAllScales(){for(const id of Object.keys(fontScales))applyScale(id);}
function defaultScales(){return{speed:{t:100,b:100},steam:{t:100,b:100},playing:{t:100,b:100},pipeline:{t:100,b:100},services:{t:100,b:100},recent:{t:100,b:100},library:{t:100,b:100}};}
ipcRenderer.on('display-changed',async()=>{const sc=await ipcRenderer.invoke('load-scales');fontScales=sc?{...defaultScales(),...sc}:defaultScales();applyAllScales();});

// ─── Init ───
(async()=>{
  const sv=await ipcRenderer.invoke('load-services');if(sv&&Array.isArray(sv))activeSvc=sv;
  const rt=await ipcRenderer.invoke('load-ratios');if(rt)ratios={...defaultRatios,...rt};
  const sc=await ipcRenderer.invoke('load-scales');if(sc)fontScales={...defaultScales(),...sc};
  const ord=await ipcRenderer.invoke('load-order');if(ord&&Array.isArray(ord))cardOrder=ord;
  buildCards();
  applyRatios();
  applyAllScales();
  loadSteamGames();
  refreshAll();
})();
setInterval(refreshAll,REFRESH_MS);
setInterval(loadSteamGames,5*60*1000);
</script>
